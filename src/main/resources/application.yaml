spring:
  application:
    name: silver_lady_s

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/silver_lady_s_db}
    username: ${DB_USER:postgres}
    # Default parol yo'q — .env faylidan o'qilishi shart
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 20

  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:50MB}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    issuer: ${JWT_ISSUER:silver_lady_s}
    # Production da kamida 64 belgili tasodifiy satr: openssl rand -hex 64
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_MIN:120}
    refresh-token-days: ${JWT_REFRESH_DAYS:30}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  recommendation:
    max-viewed-ids: ${RECOMMENDATION_MAX_VIEWED_IDS:200}

  product-view:
    retention-days: ${PRODUCT_VIEW_RETENTION_DAYS:180}

  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:8080}
    max-file-size-mb: ${MEDIA_MAX_FILE_SIZE_MB:10}
    max-images-per-product: ${MEDIA_MAX_IMAGES_PER_PRODUCT:10}

  email:
    from: ${MAIL_FROM:noreply@silverladys.uz}
    from-name: ${MAIL_FROM_NAME:Silver Lady's}
    enabled: ${MAIL_ENABLED:false}

  sms:
    eskiz:
      email: ${ESKIZ_EMAIL:}
      password: ${ESKIZ_PASSWORD:}
      sender-id: ${ESKIZ_SENDER_ID:4546}
      enabled: ${SMS_ENABLED:false}

  otp:
    ttl-minutes: ${OTP_TTL_MINUTES:5}

  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@silverladys.uz}
      # Parol HECH QACHON bu yerda yozilmaydi — faqat .env orqali
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      full-name: ${BOOTSTRAP_ADMIN_FULL_NAME:Main Admin}
