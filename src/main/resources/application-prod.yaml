# Production profili: java -jar app.jar --spring.profiles.active=prod
# Barcha sezgir qiymatlar .env fayldan o'qiladi — bu yerda hech narsa qattiq yozilmaydi

spring:
  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:50MB}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

server:
  # Production da HTTPS termination odatda reverse proxy (nginx) da bo'ladi
  port: ${PORT:8080}
  # Xato javoblarida stack trace ko'rsatilmaydi
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoint:
    health:
      show-details: never