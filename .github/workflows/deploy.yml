name: CI / Deploy to Production

on:
  push:
    branches: [prod]

jobs:
  # ── 1. Unit testlar ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: |
          mvn test \
            -Dtest="AuthServiceImplTest,CategoryServiceImplTest,OrderServiceImplTest,ProductServiceImplTest" \
            --no-transfer-progress

  # ── 2. Integration testlar (Testcontainers — Docker kerak) ──────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: |
          mvn test \
            -Dtest="AuthControllerTest,OrderControllerTest,ProductControllerTest" \
            --no-transfer-progress
        env:
          # DB_PASSWORD application-test.yaml da override qilingan (testcontainers-placeholder)
          # Shu yerda dummy qiymat yetarli — Testcontainers haqiqiy qiymatni o'rnatadi
          DB_PASSWORD: ci-testcontainers-not-used

  # ── 3. Production deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, integration-test]   # Har ikki test o'tmasdan deploy bo'lmaydi

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            echo "Kod yangilanmoqda..."
            git pull origin prod

            echo "App image qurilmoqda..."
            docker compose -f docker-compose.prod.yaml build --no-cache app

            echo "Konteynerlar qayta ishga tushirilmoqda..."
            docker compose -f docker-compose.prod.yaml up -d

            echo "Eski image'lar o'chirilmoqda..."
            docker image prune -f

            echo "Deploy muvaffaqiyatli yakunlandi"
