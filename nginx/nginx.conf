events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Rate limiting — API so'rovlari uchun (IP bo'yicha)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Gzip siqish
    gzip            on;
    gzip_vary       on;
    gzip_types      application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    upstream app_backend {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP: faqat Let's Encrypt challenge va HTTPS redirect ──────────────────
    server {
        listen 80;
        server_name silverladys.uz www.silverladys.uz;

        # Certbot webroot challenge (sertifikat olish/yangilash uchun)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Qolgan hamma narsa HTTPS ga yo'naltiriladi
        location / {
            return 301 https://silverladys.uz$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name silverladys.uz www.silverladys.uz;

        ssl_certificate     /etc/letsencrypt/live/silverladys.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/silverladys.uz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Xavfsizlik headerlari
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;

        # ── API ──────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Rasm/fayl yuklash ────────────────────────────────────────────────
        location /uploads/ {
            proxy_pass       http://app_backend;
            proxy_set_header Host $host;
            add_header       Cache-Control "public, max-age=86400";
        }

        # ── Health check (monitoring uchun) ──────────────────────────────────
        location /actuator/health {
            proxy_pass http://app_backend;
            access_log off;
        }
    }
}
